<style>
/* ═══════════════════════════════════════════════════════
   ROOT / RESET
═══════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --c-bg:      #0a0a0f;
  --c-surface: #111118;
  --c-border:  #1e1e2e;
  --c-accent1: #00e5ff;
  --c-accent2: #ff3d71;
  --c-accent3: #ffcc00;
  --c-text:    #e8e8f0;
  --c-muted:   #5a5a7a;
}
html, body { height: 100%; background: var(--c-bg); color: var(--c-text); overflow: hidden; }
body { font-family: 'Barlow Condensed', sans-serif; }

/* ═══════════════════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════════════════ */
.view { position: fixed; inset: 0; display: none; }
.view.active { display: block; }

/* ═══════════════════════════════════════════════════════
   HUB / LOBBY
═══════════════════════════════════════════════════════ */
#hub {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: var(--c-bg);
  overflow: hidden;
  position: relative;
}
#hub.active { display: flex; }

/* Animated grid background */
#hub::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridScroll 20s linear infinite;
}
@keyframes gridScroll { to { background-position: 48px 48px; } }

/* Glow blobs */
#hub::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 50%, rgba(0,229,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 30%, rgba(255,61,113,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 60% 80%, rgba(255,204,0,0.05) 0%, transparent 60%);
}

.hub-logo {
  position: relative; z-index: 2;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 8vw, 96px);
  letter-spacing: 0.18em;
  color: #fff;
  text-shadow: 0 0 60px rgba(0,229,255,0.4), 0 0 20px rgba(0,229,255,0.2);
  margin-bottom: 8px;
  animation: fadeDown 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
.hub-sub {
  position: relative; z-index: 2;
  font-size: 13px; letter-spacing: 6px; text-transform: uppercase;
  color: var(--c-muted); margin-bottom: 64px;
  animation: fadeDown 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Game cards */
.game-grid {
  position: relative; z-index: 2;
  display: flex; gap: 28px; align-items: stretch;
  animation: fadeUp 0.8s 0.2s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: translateY(0); }
}

.game-card {
  width: clamp(200px, 22vw, 280px);
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: 20px;
  padding: 36px 28px 28px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  transition: transform 0.25s cubic-bezier(0.22,1,0.36,1),
              border-color 0.2s, box-shadow 0.25s;
  position: relative; overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.25s;
  border-radius: 20px;
}
.game-card:hover { transform: translateY(-8px) scale(1.02); }
.game-card:hover::before { opacity: 1; }
.game-card:active { transform: translateY(-4px) scale(1.01); }

/* Per-card accent */
.card-football { --accent: var(--c-accent1); }
.card-cookie   { --accent: var(--c-accent3); }
.card-rocket   { --accent: var(--c-accent2); }

.game-card:hover { border-color: var(--accent); box-shadow: 0 0 32px color-mix(in srgb, var(--accent) 25%, transparent), 0 20px 40px rgba(0,0,0,0.4); }
.game-card::before { background: radial-gradient(ellipse at 50% 0%, color-mix(in srgb, var(--accent) 10%, transparent) 0%, transparent 70%); }

.card-icon {
  font-size: 64px;
  line-height: 1;
  filter: drop-shadow(0 0 18px color-mix(in srgb, var(--accent) 50%, transparent));
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), filter 0.3s;
}
.game-card:hover .card-icon {
  transform: scale(1.15) rotate(-3deg);
  filter: drop-shadow(0 0 28px color-mix(in srgb, var(--accent) 80%, transparent));
}

.card-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 4px;
  color: var(--accent); opacity: 0.7;
}
.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 3px;
  color: #fff; text-align: center; line-height: 1;
}
.card-desc {
  font-size: 12px; letter-spacing: 1px;
  color: var(--c-muted); text-align: center; line-height: 1.5;
}
.card-play {
  margin-top: 8px;
  width: 100%;
  padding: 10px 0;
  background: transparent;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  color: var(--accent);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 3px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.game-card:hover .card-play {
  background: var(--accent);
  color: #000;
}

/* Footer */
.hub-footer {
  position: absolute; bottom: 28px;
  font-size: 11px; letter-spacing: 3px; color: var(--c-muted);
  z-index: 2; text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════════
   GAME WRAPPER (shared back-button layer)
═══════════════════════════════════════════════════════ */
.game-view { position: fixed; inset: 0; display: none; flex-direction: column; }
.game-view.active { display: flex; }

.game-topbar {
  position: absolute; top: 18px; right: 18px; z-index: 999;
  display: flex; align-items: center; gap: 10px;
}
.back-btn {
  background: rgba(0,0,0,0.75); border: 1.5px solid rgba(255,255,255,0.2);
  color: #fff; font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 3px; padding: 8px 20px; border-radius: 8px;
  cursor: pointer; backdrop-filter: blur(6px);
  transition: background 0.2s, border-color 0.2s;
}
.back-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }

.game-frame {
  flex: 1;
  border: none; width: 100%; height: 100%;
}

/* iframe-based game containers */
.iframe-wrap { flex: 1; position: relative; overflow: hidden; }
.iframe-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
</style>

<script>
const DEFAULT_BINDS={up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD',sprint:'Space',shoot:'KeyJ',tackle:'KeyK',lob:'KeyL',pause:'Escape'};
let binds={...DEFAULT_BINDS};
const ACTION_LABELS={up:'Move Up',down:'Move Down',left:'Move Left',right:'Move Right',sprint:'Sprint',shoot:'Power Shot',tackle:'Tackle',lob:'Lob',pause:'Pause'};
function keyDisplayName(code){const map={Space:'SPACE',Escape:'ESC',ArrowUp:'↑',ArrowDown:'↓',ArrowLeft:'←',ArrowRight:'→',ShiftLeft:'L-SHIFT',ShiftRight:'R-SHIFT',ControlLeft:'L-CTRL',ControlRight:'R-CTRL',AltLeft:'L-ALT',AltRight:'R-ALT',Enter:'ENTER',Backspace:'BACK',Tab:'TAB'};if(map[code])return map[code];if(code.startsWith('Key'))return code.slice(3);if(code.startsWith('Digit'))return code.slice(5);if(code.startsWith('Numpad'))return 'NP'+code.slice(6);if(code.startsWith('F')&&code.length<=3)return code;return code.replace('Left','').replace('Right','').toUpperCase();}
const settingsPanel=document.getElementById('panel-settings');
let listeningAction=null,listeningBtn=null;
function buildSettingsRows(){settingsPanel.querySelectorAll('.bind-row').forEach(r=>r.remove());const resetBtn=document.getElementById('reset-binds-btn');Object.keys(ACTION_LABELS).forEach(action=>{const row=document.createElement('div');row.className='bind-row';row.innerHTML='<span class="bind-action">'+ACTION_LABELS[action]+'</span><button class="bind-key-btn" data-action="'+action+'">'+keyDisplayName(binds[action])+'</button>';settingsPanel.insertBefore(row,resetBtn);});settingsPanel.querySelectorAll('.bind-key-btn').forEach(btn=>{btn.addEventListener('click',()=>startListening(btn.dataset.action,btn));});}
buildSettingsRows();
function startListening(action,btn){if(listeningBtn){listeningBtn.classList.remove('listening');listeningBtn.textContent=keyDisplayName(binds[listeningAction]);}listeningAction=action;listeningBtn=btn;btn.classList.add('listening');btn.textContent='PRESS KEY…';}
document.getElementById('reset-binds-btn').addEventListener('click',()=>{binds={...DEFAULT_BINDS};cancelListening();buildSettingsRows();updateInGameControls();});
function cancelListening(){if(listeningBtn){listeningBtn.classList.remove('listening');listeningBtn.textContent=keyDisplayName(binds[listeningAction]);}listeningAction=null;listeningBtn=null;}
const controlsEl=document.getElementById('controls');
function updateInGameControls(){controlsEl.innerHTML=[['up','down','left','right'].map(a=>keyDisplayName(binds[a])).join('/')+' Move',''+keyDisplayName(binds.sprint)+' Sprint',''+keyDisplayName(binds.shoot)+' Power Shot',''+keyDisplayName(binds.tackle)+' Tackle',''+keyDisplayName(binds.lob)+' Lob',''+keyDisplayName(binds.pause)+' Pause'].map(t=>{const[k,...rest]=t.split(' ');return'<div class="ctrl"><span class="key">'+k+'</span> '+rest.join(' ')+'</div>';}).join('');}
updateInGameControls();
function switchTab(tab){document.getElementById('tab-pause').classList.toggle('active',tab==='pause');document.getElementById('tab-settings').classList.toggle('active',tab==='settings');document.getElementById('panel-pause').style.display=tab==='pause'?'flex':'none';document.getElementById('panel-settings').style.display=tab==='settings'?'flex':'none';if(tab==='pause')cancelListening();}
const canvas=document.getElementById('canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const scene=new THREE.Scene();scene.background=new THREE.Color(0x1a2a1a);scene.fog=new THREE.Fog(0x1a2a1a,70,130);

function render(){requestAnimationFrame(render);const dt=Math.min(clock.getDelta(),0.05);update(dt);renderer.render(scene,camera);}
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
render();
<\/script>
</body>
</html>`;

function rectsCollide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function rectCircle(circle,rect){const dx=Math.abs(circle.x-rect.x-rect.w/2),dy=Math.abs(circle.y-rect.y-rect.h/2);if(dx>rect.w/2+circle.radius||dy>rect.h/2+circle.radius)return false;return true;}

[player1,player2].forEach(p=>{if(rectCircle(ball,p)){const dx=ball.x-(p.x+p.w/2),dy=ball.y-(p.y+p.h/2);const len=Math.hypot(dx,dy)||1;ball.vx+=(dx/len)*5;ball.vy+=(dy/len)*5;}});
boostPads.forEach(pad=>{if(rectsCollide(player1,pad))player1.boost=100;if(rectsCollide(player2,pad))player2.boost=100;});

let hudText='Player 1 Boost: '+player1.boost;if(!vsAI)hudText+=' | Player 2 Boost: '+player2.boost;document.getElementById('boostHUD').textContent=hudText;document.getElementById('boostHUD').style.display='block';
